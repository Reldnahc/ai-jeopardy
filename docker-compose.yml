services:
  db:
    image: postgres:16
    container_name: ai-jeopardy-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_jeopardy
      POSTGRES_USER: ai_jeopardy
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - /mnt/user/appdata/ai-jeopardy/postgres:/var/lib/postgresql/data
      - /mnt/user/appdata/ai-jeopardy/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_jeopardy -d ai_jeopardy"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s

  app:
    image: ghcr.io/reldnahc/ai-jeopardy:latest
    container_name: ai-jeopardy
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      kokoro:
        condition: service_started
      whisper:
        condition: service_started
    environment:
      DATABASE_URL: postgres://ai_jeopardy:${DATABASE_PASSWORD}@db:5432/ai_jeopardy
      JWT_SECRET: ${JWT_SECRET}

      BRAVE_API_KEY: ${BRAVE_API_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}

      OPENAI_API_KEY: ${OPENAI_API_KEY}
      KOKORO_URL: http://kokoro:8000
      WHISPER_URL: http://whisper:8000

      NODE_ENV: production
    ports:
      - "3002:3002"

  kokoro:
    image: ghcr.io/reldnahc/ai-jeopardy-kokoro-api:latest
    environment:
      KOKORO_LANG_CODE: "a"
      KOKORO_VOICE: "af_heart"
      KOKORO_SAMPLE_RATE: "24000"
      MAX_INFLIGHT_PER_WORKER: "16"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
  whisper:
    image: ghcr.io/reldnahc/ai-jeopardy-whisper-api:latest
    environment:
      WHISPER_MODEL: "medium"
      DEVICE: "cuda"
      COMPUTE_TYPE: "float16" # try "int8_float16" if VRAM is tight
      BEAM_SIZE: "5"

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
